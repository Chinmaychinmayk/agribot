# Nav2 configuration for the farm-lane task.
#
# Key design points:
#  * Global frame is `map`, supplied by RTAB-Map RGB-D SLAM (drift-corrected).
#    No AMCL: localization comes from SLAM's map->odom + wheel odom's odom->base.
#  * The ONLY costmap obstacle source is /perception/obstacles -- the
#    depth-geometric obstacle cloud (no colour, no LiDAR). Navigation is thus
#    driven entirely by perceived geometry, never a hardcoded route.
#  * Robot radius 0.40 m + inflation makes the 0.40 m "narrow" lane correctly
#    non-traversable for the 0.67 m-wide Husky, matching the world design.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # the task is to REACH the green marker; final heading is irrelevant, so
      # the yaw tolerance is effectively open (skid-steer cannot cheaply hit an
      # exact final heading).
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 3.2
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.6
      lookahead_dist: 0.7
      min_lookahead_dist: 0.3
      max_lookahead_dist: 1.2
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      # The base (driven by planar_move) can rotate in place, so allow
      # rotate-to-heading for the sharp turns needed at row junctions.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 1.0
      rotate_to_heading_angular_vel: 1.0
      allow_reversing: false
      max_angular_accel: 2.5
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.6, 0.0, 1.5]
    min_velocity: [-0.6, 0.0, -1.5]
    max_accel: [2.0, 0.0, 3.2]
    max_decel: [-2.0, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.40
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: depth_cloud
        depth_cloud:
          topic: /perception/obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: false
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          obstacle_max_range: 9.0
          raytrace_max_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # large rolling window that always covers the whole ~15 m farm, so beds
      # the camera has already seen stay marked (clearing:false) and the global
      # planner can route around them instead of into dead ends.
      rolling_window: true
      width: 40
      height: 40
      resolution: 0.05
      robot_radius: 0.40
      track_unknown_space: false
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: depth_cloud
        depth_cloud:
          topic: /perception/obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: false
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          obstacle_max_range: 9.0
          raytrace_max_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: true
